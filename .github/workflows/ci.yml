name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup Helm
      uses: azure/setup-helm@v4

    - name: Restore dependencies
      run: dotnet restore

    - name: Install frontend dependencies
      run: npm install

    - name: Build frontend bundle
      run: npm run build:ui

    - name: Lint Helm chart
      run: helm lint helm/opentakrouter

    - name: Build
      run: dotnet build opentakrouter.sln -m:1

    - name: Test
      run: dotnet test opentakrouter.sln -m:1
