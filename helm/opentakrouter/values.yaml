replicaCount: 1

image:
  repository: ghcr.io/darkplusplus/opentakrouter
  pullPolicy: IfNotPresent
  tag: "2.0.5"

service:
  type: ClusterIP
  apiPort: 8443
  websocketPort: 5000
  takTcpPort: 58087
  takTlsPort: 8089

# Public server identity used by the API, WebSocket TLS, and TAK TLS listener.
# With cert-manager enabled, this is typically the public CA-issued certificate.
tls:
  secretName: opentakrouter-tls
  mountPath: /certs
  certFile: tls.crt
  keyFile: tls.key
  passphraseSecretName: ""
  passphraseSecretKey: ""

provisioning:
  enabled: false
  packageName: OpenTAKRouter
  serverDescription: OpenTAKRouter
  # Optional externally reachable API URL override for package downloads.
  publicApiScheme: ""
  publicApiPort: 0
  # Legacy/shared secret name fallback when both enrollment artifacts live in one secret.
  secretName: opentakrouter-provisioning
  mountPath: /provisioning
  # Deprecated plaintext fallback for compatibility with older values files.
  trustStorePassword: ""
  trustStorePasswordSecretName: ""
  trustStorePasswordSecretKey: ""
  # Deprecated plaintext fallback for compatibility with older values files.
  clientCertificatePassword: ""
  clientCertificatePasswordSecretName: ""
  clientCertificatePasswordSecretKey: ""
  # Trust bundle imported by the client package. This is typically your CA cert,
  # not the same thing as the server's private keypair.
  trustStore:
    secretName: ""
    secretKey: trust.p12
    fileName: trust.p12
    create: false
    data: ""
  # Client identity bundle imported onto the EUD for soft-cert onboarding.
  clientCertificate:
    secretName: ""
    secretKey: client.p12
    fileName: client.p12
    create: false
    data: ""

certManager:
  enabled: false
  secretName: ""
  issuerRef:
    name: ""
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: opentakrouter.local
  dnsNames:
    - opentakrouter.local
  usages:
    - server auth
    - client auth

ingress:
  enabled: false
  className: ""
  # Optional explicit public scheme/port for generated provisioning URLs.
  # When omitted, the chart defaults to 443 for TLS ingress and 80 otherwise.
  publicApiScheme: ""
  publicApiPort: 0
  annotations: {}
  hosts:
    - host: opentakrouter.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

storage:
  provider: postgres
  sqlite:
    path: opentakrouter.db
  postgres:
    connectionString: "Host=postgres;Port=5432;Database=opentakrouter;Username=opentakrouter;Password=change-me"

config:
  publicEndpoint: opentakrouter.local
  persistMessages: true
  api:
    enabled: true
    swagger: true
    ssl: true
  websockets:
    enabled: true
    ssl: false
  links:
    - name: atak-listener
      enabled: true
      role: listen
      transport: tls
      port: 8089
      cert: /certs/tls.crt
      key: /certs/tls.key
      protocol: xml
  routing:
    inbound: []
    outbound: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
