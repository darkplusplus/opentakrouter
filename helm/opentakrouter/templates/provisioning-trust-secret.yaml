{{- if and .Values.provisioning.enabled .Values.provisioning.trustStore.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opentakrouter.provisioningTrustSecretName" . }}
  labels:
    {{- include "opentakrouter.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.provisioning.trustStore.secretKey }}: {{ required "provisioning.trustStore.data is required when provisioning.trustStore.create=true" .Values.provisioning.trustStore.data | quote }}
{{- end }}
