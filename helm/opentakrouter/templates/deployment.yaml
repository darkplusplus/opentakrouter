apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opentakrouter.fullname" . }}
  labels:
    {{- include "opentakrouter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opentakrouter.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "opentakrouter.labels" . | nindent 8 }}
    spec:
      containers:
        - name: opentakrouter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if eq .Values.storage.provider "postgres" }}
            - name: server__storage__postgres__connectionString
              value: {{ .Values.storage.postgres.connectionString | quote }}
            {{- end }}
            {{- if and .Values.tls.passphraseSecretName .Values.tls.passphraseSecretKey }}
            - name: server__api__passphrase
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tls.passphraseSecretName }}
                  key: {{ .Values.tls.passphraseSecretKey }}
            - name: server__websockets__passphrase
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tls.passphraseSecretName }}
                  key: {{ .Values.tls.passphraseSecretKey }}
            {{- end }}
            {{- if and .Values.provisioning.trustStorePasswordSecretName .Values.provisioning.trustStorePasswordSecretKey }}
            - name: server__provisioning__trustStorePassword
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.provisioning.trustStorePasswordSecretName }}
                  key: {{ .Values.provisioning.trustStorePasswordSecretKey }}
            {{- end }}
            {{- if and .Values.provisioning.clientCertificatePasswordSecretName .Values.provisioning.clientCertificatePasswordSecretKey }}
            - name: server__provisioning__clientCertificatePassword
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.provisioning.clientCertificatePasswordSecretName }}
                  key: {{ .Values.provisioning.clientCertificatePasswordSecretKey }}
            {{- end }}
          ports:
            {{- if .Values.config.api.enabled }}
            - name: http
              containerPort: {{ .Values.service.apiPort }}
            {{- end }}
            {{- if .Values.config.websockets.enabled }}
            - name: websocket
              containerPort: {{ .Values.service.websocketPort }}
            {{- end }}
            {{- range .Values.config.links }}
            {{- if and .enabled (eq .role "listen") (eq .transport "tcp") }}
            - name: tak-tcp
              containerPort: {{ .port }}
            {{- end }}
            {{- if and .enabled (eq .role "listen") (eq .transport "tls") }}
            - name: tak-tls
              containerPort: {{ .port }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/opentakrouter.json
              subPath: opentakrouter.json
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- if .Values.provisioning.enabled }}
            - name: provisioning
              mountPath: {{ .Values.provisioning.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "opentakrouter.fullname" . }}-config
        - name: tls
          secret:
            secretName: {{ include "opentakrouter.tlsSecretName" . }}
        {{- if .Values.provisioning.enabled }}
        - name: provisioning
          projected:
            sources:
              - secret:
                  name: {{ include "opentakrouter.provisioningTrustSecretName" . }}
                  items:
                    - key: {{ .Values.provisioning.trustStore.secretKey }}
                      path: {{ .Values.provisioning.trustStore.fileName }}
              - secret:
                  name: {{ include "opentakrouter.provisioningClientSecretName" . }}
                  items:
                    - key: {{ .Values.provisioning.clientCertificate.secretKey }}
                      path: {{ .Values.provisioning.clientCertificate.fileName }}
        {{- end }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
